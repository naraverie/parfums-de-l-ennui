<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les parfums de l'ennui — Sarah Dunham</title>
<meta name="description" content="Les parfums de l'ennui — textes et fragments de Sarah Dunham. Crise existentielle, spiritualité, solitude, amour, corps, schémas familiaux. Une voix née en 1998.">
<meta name="keywords" content="jeune auteure française, crise du siècle, spiritualité, crise existentielle, gen Z, millenials, solitude, sentiment de vide, écriture fragmentaire, rapport au corps, dysphorie de genre, amour, relations toxiques, schémas répétitifs, schémas familiaux complexes, religion, 1998, 2026, nouvelle ère, fragments littéraires, prose française, santé mentale, anxiété générationnelle, dépression silencieuse, burnout émotionnel, attachement anxieux, trauma de l'enfance, enfant parentifié, relation mère fille, blessure d'abandon, hypervigilance, reconstruction identitaire, quête de sens, éveil spirituel, introspection, journal intime, écriture thérapeutique, féminin sacré, renaissance personnelle, rupture amoureuse, dépendance affective, amour propre, estime de soi, vide existentiel, identité fluide, blog littéraire français, textes intimes, autofiction, écriture du réel, littérature du moi, fragments poétiques, voix émergente, prose contemporaine, écriture féminine, génération anxieuse, néo-spiritualité, dissociation, corps et âme, schémas inconscients, psychologie profonde, autofiction française, littérature contemporaine, roman intime, récit de filiation, mémoire familiale, voix féminine française, écriture du corps, roman psychologique, jeune autrice, blog littéraire, autofiction engagée, micro-fiction, flash fiction, journal littéraire, écrits du quotidien, littérature du je, Annie Ernaux, Virginie Despentes, Leïla Slimani, Fatima Daas, Kaoutar Harchi, Gaël Faye, Mélissa Da Costa, Emmanuel Carrère, booktok, bookstagram, roman pour gen Z, livre sur la famille toxique, livre sur l'attachement, livre sur le trauma, rentrée littéraire 2026">
<meta property="og:title" content="Les parfums de l'ennui — Sarah Dunham">
<meta property="og:description" content="Les parfums de l'ennui — textes et fragments de Sarah Dunham. Crise existentielle, spiritualité, solitude, amour, corps, schémas familiaux.">
<meta property="og:type" content="website">
<meta name="author" content="Sarah Dunham">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;min-height:100vh;font-family:'Times New Roman',Times,serif;color:#111}
::selection{background:#9B3A3A;color:#fff}
.wrap{max-width:680px;margin:0 auto;padding:0 0 80px}
.header{padding:40px 28px 20px;text-align:center;border-bottom:3px double #111}
.header h1{font-size:clamp(32px,6vw,44px);font-weight:400;font-style:italic;color:#111;font-family:'Playfair Display',Georgia,serif;letter-spacing:0.5px;line-height:1}
.header-sub{margin-top:10px;padding-top:8px;border-top:1px solid #111;font-size:10px;color:#777;letter-spacing:0.15em;text-transform:uppercase}
.status{text-align:center;font-size:10px;color:#9B3A3A;letter-spacing:0.12em;text-transform:uppercase;min-height:14px;padding:10px 0}
.grid{padding:0 28px;display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #111}
.card{padding:24px 16px;border-right:1px solid #111;border-bottom:1px solid #111;cursor:pointer;transition:opacity .15s}
.card:hover{opacity:.7}
.card:nth-child(2n){border-right:none}
.card:nth-last-child(-n+2){border-bottom:none}
.card:nth-last-child(1):nth-child(odd){grid-column:span 2;border-right:none}
.pnum{font-size:9px;color:#888;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:8px}
.ptitle{font-size:17px;font-style:italic;color:#111;line-height:1.3;margin-bottom:8px;font-family:'Playfair Display',Georgia,serif;font-weight:400}
.pex{font-size:12px;color:#333;line-height:1.75}
.pfoot{margin-top:10px;font-size:9px;color:#888;letter-spacing:0.1em;text-transform:uppercase}
.empty{text-align:center;padding:60px 28px;font-size:13px;color:#888;letter-spacing:0.05em;display:none}
#art-view{display:none;padding:0 28px 60px}
.back{font-size:10px;color:#9B3A3A;background:none;border:none;cursor:pointer;padding:24px 0 0;font-family:'Times New Roman',Times,serif;letter-spacing:0.15em;text-transform:uppercase;display:block}
.back:hover{opacity:.7}
.art-num{font-size:9px;color:#888;letter-spacing:0.18em;text-transform:uppercase;margin:20px 0 10px;display:block}
.art-title{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:28px;color:#111;line-height:1.2;margin-bottom:6px;font-weight:400}
.art-rule{border:none;border-top:1px solid #111;margin:14px 0 18px}
.art-meta{font-size:9px;color:#888;margin-bottom:24px;letter-spacing:0.15em;text-transform:uppercase}
.art-body{font-size:16px;line-height:2;color:#111}
.art-body p{margin-bottom:1.4em}
.art-body em{font-style:italic}
.art-actions{display:none;gap:10px;margin-top:24px;padding-top:16px;border-top:1px dashed #ccc}
.art-actions.show{display:flex}
.mini-btn{font-family:'Times New Roman',Times,serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:none;border:1px solid #888;color:#888;padding:6px 14px;cursor:pointer}
.mini-btn:hover{border-color:#9B3A3A;color:#9B3A3A}
.mini-btn.danger:hover{background:#9B3A3A;color:#fff;border-color:#9B3A3A}
footer{padding:16px 28px;text-align:center;border-top:3px double #111;font-size:11px;color:#888;font-style:italic;font-family:'Playfair Display',Georgia,serif;letter-spacing:0.5px}

/* Lock button */
.lock-btn{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;border:1px solid #ccc;background:#fff;color:#888;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Times New Roman',Times,serif}
.lock-btn:hover{border-color:#9B3A3A;color:#9B3A3A}
.lock-btn.unlocked{border-color:#9B3A3A;color:#9B3A3A}
.new-btn{display:none;margin:16px 28px;font-family:'Times New Roman',Times,serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;background:none;border:1px solid #111;color:#111;padding:10px 20px;cursor:pointer;width:calc(100% - 56px)}
.new-btn:hover{background:#111;color:#fff}
.new-btn.show{display:block}

/* Overlay modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:20px;z-index:50}
.overlay.show{display:flex}
.modal{background:#fff;max-width:520px;width:100%;padding:32px 28px;border-top:3px double #111}
.modal h3{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:20px;font-weight:400;color:#111;margin-bottom:20px}
.modal input[type=password],.modal input[type=text],.modal textarea{width:100%;font-family:'Times New Roman',Times,serif;font-size:15px;border:1px solid #ccc;padding:10px 12px;color:#111;margin-bottom:12px;resize:vertical;background:#fafafa}
.modal input:focus,.modal textarea:focus{outline:none;border-color:#9B3A3A}
.modal textarea{min-height:240px;line-height:1.7}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn{font-family:'Times New Roman',Times,serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 20px;border:1px solid #111;background:none;color:#111;cursor:pointer}
.btn.primary{background:#111;color:#fff}
.btn:hover{opacity:.8}
.modal-error{font-size:11px;color:#9B3A3A;min-height:14px;margin-bottom:8px;letter-spacing:0.05em}

@media(max-width:480px){.grid{grid-template-columns:1fr}.card{border-right:none}.card:nth-child(2n){border-right:none}.art-title{font-size:22px}.art-body{font-size:15px}}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>Les parfums de l'ennui</h1>
    <div class="header-sub">Sarah Dunham &nbsp;&middot;&nbsp; Que des fragments, versions compl&egrave;tes &agrave; venir.</div>
  </div>

  <div class="status" id="statusLine"></div>
  <button class="new-btn" id="newBtn">+ nouvel article</button>

  <div id="list-view">
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyState">— aucun article pour l'instant —</div>
  </div>

  <div id="art-view"></div>

  <footer>Les parfums de l&rsquo;ennui &mdash; Sarah Dunham</footer>
</div>

<button class="lock-btn" id="lockBtn" title="Éditer">&#9998;</button>

<!-- MODALE CODE -->
<div class="overlay" id="codeOverlay">
  <div class="modal">
    <h3>code d'accès</h3>
    <input type="password" id="codeInput" placeholder="••••••" autocomplete="off">
    <div class="modal-error" id="codeError"></div>
    <div class="modal-actions">
      <button class="btn" id="codeCancel">annuler</button>
      <button class="btn primary" id="codeSubmit">déverrouiller</button>
    </div>
  </div>
</div>

<!-- MODALE ÉCRITURE -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3 id="editModalTitle">nouvel article</h3>
    <input type="text" id="postTitle" placeholder="titre">
    <input type="text" id="postDate" placeholder="date (ex: Juillet 2026)">
    <textarea id="postContent" placeholder="écrire ici… (HTML accepté : &lt;p&gt;, &lt;em&gt;, &lt;br&gt;)"></textarea>
    <div class="modal-error" id="editError"></div>
    <div class="modal-actions">
      <button class="btn" id="editCancel">annuler</button>
      <button class="btn primary" id="editSave">enregistrer</button>
    </div>
  </div>
</div>

<script>
var FN = "/.netlify/functions/posts";
var accessCode = null;
var posts = [];
var editingId = null;

var grid = document.getElementById('grid');
var emptyEl = document.getElementById('emptyState');
var statusLine = document.getElementById('statusLine');
var lockBtn = document.getElementById('lockBtn');
var newBtn = document.getElementById('newBtn');
var artView = document.getElementById('art-view');
var listView = document.getElementById('list-view');

var codeOverlay = document.getElementById('codeOverlay');
var codeInput = document.getElementById('codeInput');
var codeError = document.getElementById('codeError');
var editOverlay = document.getElementById('editOverlay');
var postTitle = document.getElementById('postTitle');
var postDate = document.getElementById('postDate');
var postContent = document.getElementById('postContent');
var editError = document.getElementById('editError');

function excerpt(html){
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var txt = tmp.textContent || '';
  return txt.slice(0, 160) + (txt.length > 160 ? '…' : '');
}

function renderList(){
  artView.style.display = 'none';
  listView.style.display = 'block';
  grid.innerHTML = '';
  if(!posts.length){
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  posts.forEach(function(p, i){
    var d = document.createElement('div');
    d.className = 'card';
    d.innerHTML =
      '<div class="pnum">Art. '+(i+1)+' &middot; '+(p.date||'')+'</div>'+
      '<div class="ptitle">'+(p.title||'Sans titre')+'</div>'+
      '<div class="pex">'+excerpt(p.content)+'</div>'+
      '<div class="pfoot">Lire &rsaquo;&rsaquo;</div>';
    d.onclick = function(){ openPost(p.id); };
    grid.appendChild(d);
  });
}

function openPost(id){
  var p = null, idx = 0;
  for(var i=0;i<posts.length;i++){if(posts[i].id===id){p=posts[i];idx=i+1;break;}}
  if(!p) return;
  listView.style.display = 'none';
  artView.style.display = 'block';
  artView.innerHTML =
    '<button class="back" onclick="backToList()">&lsaquo;&lsaquo; Retour</button>'+
    '<span class="art-num">Article '+idx+' &middot; '+(p.date||'')+'</span>'+
    '<div class="art-title">'+(p.title||'Sans titre')+'</div>'+
    '<hr class="art-rule">'+
    '<div class="art-meta">'+new Date(p.date_iso||p.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'.')+'</div>'+
    '<div class="art-body">'+p.content+'</div>'+
    '<div class="art-actions'+(accessCode?' show':'')+'" id="art-actions-'+p.id+'">'+
    '<button class="mini-btn" onclick="openEditor(\''+p.id+'\')">modifier</button>'+
    '<button class="mini-btn danger" onclick="deletePost(\''+p.id+'\')">supprimer</button>'+
    '</div>';
  window.scrollTo(0,0);
}

function backToList(){
  artView.style.display = 'none';
  listView.style.display = 'block';
}

async function loadPosts(){
  statusLine.textContent = 'chargement…';
  try{
    var res = await fetch(FN);
    posts = await res.json();
    if(!Array.isArray(posts)) posts = [];
    statusLine.textContent = '';
    renderList();
  }catch(e){
    statusLine.textContent = 'impossible de charger les articles';
  }
}

lockBtn.addEventListener('click', function(){
  if(accessCode){
    accessCode = null;
    lockBtn.classList.remove('unlocked');
    newBtn.classList.remove('show');
    statusLine.textContent = '';
    renderList();
  } else {
    codeInput.value = '';
    codeError.textContent = '';
    codeOverlay.classList.add('show');
    setTimeout(function(){codeInput.focus();}, 100);
  }
});

document.getElementById('codeCancel').addEventListener('click', function(){
  codeOverlay.classList.remove('show');
});

async function tryUnlock(){
  var code = codeInput.value;
  if(!code) return;
  codeError.textContent = 'vérification…';
  try{
    var res = await fetch(FN, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'verify', code:code})
    });
    if(res.ok){
      accessCode = code;
      lockBtn.classList.add('unlocked');
      newBtn.classList.add('show');
      statusLine.textContent = 'édition activée';
      codeOverlay.classList.remove('show');
      renderList();
    } else {
      codeError.textContent = 'code incorrect';
    }
  }catch(e){
    codeError.textContent = 'erreur réseau';
  }
}

document.getElementById('codeSubmit').addEventListener('click', tryUnlock);
codeInput.addEventListener('keydown', function(e){ if(e.key==='Enter') tryUnlock(); });

newBtn.addEventListener('click', function(){ openEditor(null); });

function openEditor(id){
  editingId = id;
  var p = id ? posts.find(function(x){return x.id===id;}) : null;
  document.getElementById('editModalTitle').textContent = p ? 'modifier l\'article' : 'nouvel article';
  postTitle.value = p ? (p.title||'') : '';
  postDate.value = p ? (p.date||'') : '';
  postContent.value = p ? (p.content||'') : '';
  editError.textContent = '';
  editOverlay.classList.add('show');
  setTimeout(function(){postContent.focus();}, 100);
}

document.getElementById('editCancel').addEventListener('click', function(){
  editOverlay.classList.remove('show');
});

document.getElementById('editSave').addEventListener('click', async function(){
  if(!accessCode){ editOverlay.classList.remove('show'); return; }
  var title = postTitle.value.trim();
  var date = postDate.value.trim();
  var content = postContent.value.trim();
  if(!content){ editError.textContent = 'l\'article est vide'; return; }
  editError.textContent = 'enregistrement…';
  try{
    var method = editingId ? 'PUT' : 'POST';
    var res = await fetch(FN, {
      method: method,
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id:editingId, code:accessCode, title:title, date:date, content:content})
    });
    if(res.ok){
      editOverlay.classList.remove('show');
      await loadPosts();
    } else {
      var err = await res.json().catch(function(){return{};});
      editError.textContent = err.error || 'erreur';
    }
  }catch(e){
    editError.textContent = 'erreur réseau';
  }
});

async function deletePost(id){
  if(!accessCode) return;
  if(!confirm('Supprimer cet article ?')) return;
  try{
    var res = await fetch(FN, {
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id:id, code:accessCode})
    });
    if(res.ok){
      backToList();
      await loadPosts();
    } else {
      alert('Suppression impossible');
    }
  }catch(e){
    alert('erreur réseau');
  }
}

[codeOverlay, editOverlay].forEach(function(ov){
  ov.addEventListener('click', function(e){
    if(e.target===ov) ov.classList.remove('show');
  });
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    codeOverlay.classList.remove('show');
    editOverlay.classList.remove('show');
  }
});

loadPosts();
</script>
</body>
</html>
